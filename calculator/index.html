<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Analytics Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-container">
        <div class="brand-header">⚡ QUANTUM ENGINE</div>
        <div class="display-wrapper">
            <div class="history" id="history"></div>
            <div class="main-display" id="display">0</div>
        </div>
        
        <div class="mode-tabs">
            <button class="mode-btn active" onclick="switchMode('scientific')">Scientific</button>
            <button class="mode-btn" onclick="switchMode('converter')">Converter</button>
        </div>

        <div id="sci-grid" class="grid-layout active">
            <button class="btn util" onclick="clearAll()">C</button>
            <button class="btn util" onclick="backspace()">⌫</button>
            <button class="btn sci" onclick="inputSci('Math.PI')">π</button>
            <button class="btn op" onclick="inputOp('/')">÷</button>

            <button class="btn sci" onclick="inputSci('Math.sin')">sin</button>
            <button class="btn sci" onclick="inputSci('Math.cos')">cos</button>
            <button class="btn sci" onclick="inputSci('Math.tan')">tan</button>
            <button class="btn op" onclick="inputOp('*')">×</button>

            <button class="btn" onclick="inputNum('7')">7</button>
            <button class="btn" onclick="inputNum('8')">8</button>
            <button class="btn" onclick="inputNum('9')">9</button>
            <button class="btn op" onclick="inputOp('-')">−</button>

            <button class="btn" onclick="inputNum('4')">4</button>
            <button class="btn" onclick="inputNum('5')">5</button>
            <button class="btn" onclick="inputNum('6')">6</button>
            <button class="btn op" onclick="inputOp('+')">+</button>

            <button class="btn" onclick="inputNum('1')">1</button>
            <button class="btn" onclick="inputNum('2')">2</button>
            <button class="btn" onclick="inputNum('3')">3</button>
            <button class="btn sci" onclick="inputSci('Math.sqrt')">√</button>

            <button class="btn" onclick="inputNum('0')">0</button>
            <button class="btn" onclick="inputNum('.')">.</button>
            <button class="btn eq" onclick="evaluateMath()">=</button>
        </div>

        <div id="conv-ui" class="grid-layout converter-pane">
            <select id="conv-type" onchange="updateUnits()">
                <option value="length">Length (Meters to Kilometers)</option>
                <option value="weight">Weight (Kilograms to Grams)</option>
            </select>
            <input type="number" id="conv-input" placeholder="Enter Value" oninput="runConversion()">
            <div class="conv-result" id="conv-output">Result: 0</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
